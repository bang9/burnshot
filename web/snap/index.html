<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <title>Burnshot — Snap</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="snap-container" id="app">
    <div class="viewfinder-wrapper" id="viewfinder">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
    <div class="snap-controls">
      <div class="zoom-pills" id="zoom-pills">
        <button data-zoom="1" class="active">1x</button>
        <button data-zoom="1.5">1.5x</button>
        <button data-zoom="2">2x</button>
      </div>
      <p class="swipe-hint">← swipe to change template →</p>
      <div class="template-dots" id="dots"></div>
      <button class="capture-btn" id="capture" aria-label="Capture"></button>
    </div>
  </div>

  <div class="error-screen" id="error" style="display:none">
    <h2>Oops</h2>
    <p id="error-msg"></p>
  </div>

  <!-- Hidden canvas for final 1080x1080 composite -->
  <canvas id="composite" width="1080" height="1080" style="display:none"></canvas>

  <script type="module" src="../js/firebase.js"></script>
  <script type="module">
    import { parseData } from '../js/data.js';
    import { initCamera, setZoom } from '../js/camera.js';
    import { startOverlay, setTemplate } from '../js/overlay.js';
    import { TEMPLATES } from '../js/templates.js';
    import { initSwipe } from '../js/swipe.js';
    import { initCapture } from '../js/capture.js';
    import { trackEvent } from '../js/firebase.js';

    const data = parseData();
    if (!data) {
      document.getElementById('app').style.display = 'none';
      const errEl = document.getElementById('error');
      errEl.style.display = 'flex';
      document.getElementById('error-msg').textContent =
        'Invalid burnshot data. Generate a new QR from your terminal.';
    } else if (data.error === 'version_mismatch') {
      document.getElementById('app').style.display = 'none';
      const errEl = document.getElementById('error');
      errEl.style.display = 'flex';
      document.getElementById('error-msg').textContent =
        'Update your browser page \u2014 this burnshot was created with a newer version.';
    } else {
      try {
        await initCamera(document.getElementById('video'));
        trackEvent('camera_granted');
        startOverlay(document.getElementById('overlay'), document.getElementById('video'), data);
        initSwipe(document.getElementById('viewfinder'), TEMPLATES, setTemplate, document.getElementById('dots'));
        initCapture(
          document.getElementById('capture'),
          document.getElementById('video'),
          document.getElementById('overlay'),
          document.getElementById('composite')
        );

        // Zoom pill buttons
        const zoomPills = document.getElementById('zoom-pills');
        zoomPills.addEventListener('click', (e) => {
          const btn = e.target.closest('[data-zoom]');
          if (!btn || btn.disabled) return;
          const level = parseFloat(btn.dataset.zoom);
          setZoom(level);
          zoomPills.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      } catch (err) {
        document.getElementById('app').style.display = 'none';
        const errEl = document.getElementById('error');
        errEl.style.display = 'flex';
        document.getElementById('error-msg').innerHTML =
          '<strong>Camera access denied.</strong><br>' +
          '<button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;font-size:14px;cursor:pointer;">Retry</button>' +
          '<div style="margin-top:16px;font-size:13px;opacity:0.7;text-align:left">' +
          '<strong>Stats (no camera):</strong><br>' +
          'Tokens: ' + (data.tokens ? data.tokens.total.toLocaleString() : '—') + '<br>' +
          'Cost: $' + (data.cost != null ? data.cost.toFixed(2) : '—') + '<br>' +
          'Sessions: ' + (data.sessions ? data.sessions.total : '—') +
          '</div>';
      }
    }
  </script>
</body>
</html>
